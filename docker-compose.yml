version: '3.8'

services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/skarion
      - JWT_SECRET=change-me-in-production
      - NODE_ENV=production
      - APP_URL=http://localhost:4000
      - PORT=4000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/migrations:/app/migrations
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/ready').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=skarion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skarion"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
