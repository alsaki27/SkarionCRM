name: CI

on:
  push:
    branches: [main, cloudflare-platform-rewrite]
  pull_request:
    branches: [main, cloudflare-platform-rewrite]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # Deploy is handled by .github/workflows/deploy-identity.yml (ticket 1.8),
  # a separate workflow scoped to push events on cloudflare-platform-rewrite
  # only, so it doesn't depend on this job's pass/fail and doesn't block PRs.
