name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skarion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d skarion_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skarion_test
      JWT_SECRET: ci-jwt-secret-change-me-please-32chars
      AI_KEYS_ENCRYPTION_SECRET: ci-ai-keys-encryption-secret-32chars
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Typecheck focused packages
        run: npm run typecheck --workspace=@skarion/permissions
      - name: Run focused package tests
        run: npm run test --workspace=@skarion/permissions
      - name: Run database migrations
        run: npm run db:migrate
      - name: Run server test suite
        run: npm test
      - run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway/Render
        run: echo "Add your deployment step here"
