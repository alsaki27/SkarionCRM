name: deploy-crm
on:
  push:
    branches: [cloudflare-platform-rewrite]
    paths:
      - 'apps/crm/**'
      - 'packages/permissions/**'
      - 'packages/importers/**'
      - 'packages/db-kit/**'
      - 'packages/auth-client/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-crm.yml'

concurrency:
  group: deploy-crm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    name: Run Drizzle migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd apps/crm && pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-worker:
    name: Deploy CRM Worker
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skarion/crm typecheck
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/crm
          command: deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  # Pages is deployed via Cloudflare's GitHub integration (auto-build on push).
  # Project: skarion-crm | Branch: cloudflare-platform-rewrite | Root: apps/crm/web
