name: Deploy CRM (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - 'apps/crm/**'
      - 'packages/permissions/**'
      - 'packages/importers/**'
      - 'packages/db-kit/**'
      - 'packages/auth-client/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-crm.yml'
  workflow_dispatch:

concurrency:
  group: deploy-crm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    name: Run Drizzle migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd apps/crm && pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-worker:
    name: Deploy CRM Worker
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skarion/crm typecheck
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/crm
          command: deploy

      - name: Set DATABASE_URL secret
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/crm
          command: secret put DATABASE_URL --value "${{ secrets.DATABASE_URL }}"
      - name: Set JWT_SECRET secret
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/crm
          command: secret put JWT_SECRET --value "${{ secrets.JWT_SECRET }}"
      - name: Set GOOGLE_API_KEY secret
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/crm
          command: secret put GOOGLE_API_KEY --value "${{ secrets.GOOGLE_API_KEY }}"
      - name: Set GOOGLE_CHAT_MODEL secret
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/crm
          command: secret put GOOGLE_CHAT_MODEL --value "${{ secrets.GOOGLE_CHAT_MODEL }}"
      - name: Set GOOGLE_EMBEDDING_MODEL secret
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/crm
          command: secret put GOOGLE_EMBEDDING_MODEL --value "${{ secrets.GOOGLE_EMBEDDING_MODEL }}"

  # CRM Pages is deployed via Cloudflare's GitHub integration (auto-build on push).
  # Project: skarion-crm | Branch: main | Root: apps/crm/web
  # Required Pages env vars (set in Cloudflare dashboard):
  #   VITE_API_URL=https://skarion-crm-platform.alsaki1999.workers.dev
  #   VITE_IDENTITY_API_URL=https://skarion-identity.alsaki1999.workers.dev
