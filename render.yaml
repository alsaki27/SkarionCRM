services:
  - type: web
    name: skarion-crm
    env: node
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: skarion-db
          property: connectionString
    healthCheckPath: /health

databases:
  - name: skarion-db
    databaseName: skarion
    user: skarion
